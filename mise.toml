[tools]
rust = "1.93.0"
zig = "0.15.2"

[settings]
experimental = true

[env]
RUST_BACKTRACE = "1"

[hooks]
preinstall = { task = "deps:macos" }

[tasks."deps:macos"]
description = "Install macOS Homebrew dependencies from Brewfile"
run = '''
if [ "$(uname -s)" != "Darwin" ]; then
  echo "Skipping macOS Homebrew dependencies on $(uname -s)"
  exit 0
fi
if ! command -v brew >/dev/null 2>&1; then
  echo "Homebrew is required for macOS dependencies. Install it from https://brew.sh/" >&2
  exit 1
fi
brew bundle --file Brewfile
'''

[tasks.fmt]
description = "Format the Rust workspace"
run = "cargo fmt --all"

[tasks."fmt:check"]
description = "Check Rust formatting"
run = "cargo fmt --all -- --check"

[tasks."check:portable"]
description = "Check the Linux-testable macOS port foundation crates"
run = "cargo check -p lmux-compositor -p lmux-bus -p lmux-control -p lmux-pty -p lmux-wayland-host"

[tasks."test:compositor"]
description = "Run compositor contract tests, including the macOS helper scaffold"
run = "cargo test -p lmux-compositor"

[tasks."test:portable"]
description = "Run portable bus/control/PTY tests"
run = "cargo test -p lmux-bus -p lmux-control -p lmux-pty"

[tasks."test:port"]
description = "Run the Linux-testable macOS port test set"
depends = ["test:compositor", "test:portable"]

[tasks."check:app"]
description = "Check the GTK app binary with the pinned Zig toolchain"
run = "cargo check -p lmux"

[tasks."build:app"]
description = "Build the lmux app binary with the pinned Zig toolchain"
run = "cargo build -p lmux"

[tasks."macos:smoke"]
description = "Run the first-pass macOS smoke test sequence"
run = "scripts/macos-smoke.sh"

[tasks."doctor:macos"]
description = "Check macOS build prerequisites before running the port"
run = "scripts/macos-doctor.sh"

[tasks.terminal]
description = "Run the lmux terminal"
env = { RUST_LOG = "lmux=debug" }
run = "cargo run -p lmux"

[tasks.verify]
description = "Run formatting plus the Linux-testable macOS port checks"
depends = ["fmt:check", "check:portable", "test:port"]
